# Portable Recon Toolkit - default settings.
#
# This file is optional. When present, the recon CLI reads it at startup
# and folds the values into argparse defaults *before* parsing the command
# line, so explicit flags always win.
#
# Keys mirror argparse dest names. Unknown keys are ignored silently.
# Requires Python 3.11+ for tomllib; older interpreters will skip the file
# with a single warning and use built-in defaults.

[scan]
# profile = "default"
# ports = "1-1024"
# no_nmap = false

[dns]
# server = "1.1.1.1"
# wordlist = "config/wordlists/subdomains.txt"

[full]
# profile = "default"
# wordlist = "config/wordlists/subdomains.txt"

[dashboard]
# host = "127.0.0.1"
# port = 8787
# token = ""                         # set to enforce bearer-token auth
# auth = false                       # true => generate a random token
# scheduler = false                  # start the recurring-scan scheduler too

# Recurring scans are managed via `recon schedule ...` and persisted to
# config/schedules.json - there is no [schedule] section in this file.

[logging]
# log_file = "results/recon.log"

[encryption]
# Always encrypt session results at rest. When set to true, scan / dns /
# whois / full refuse to run unless RECON_PASSWORD is set, ensuring
# plaintext never lands on the USB drive. The scheduler also honors
# RECON_PASSWORD on its own (it does not read this flag), so background
# fires inherit the same protection automatically.
# encrypt_results = true
