<!doctype html>
<!--
  ============================================================================
  How to use this file
  ============================================================================
  1. Double-click this file to open it in your web browser.
  2. Click anywhere inside the framed card, then press Ctrl+A (Cmd+A on Mac)
     to select everything, and Ctrl+C (Cmd+C) to copy.
  3. Open Gmail / Outlook / Apple Mail, start a new email, click in the body,
     and press Ctrl+V (Cmd+V) to paste. The formatting and the button will
     come along for the ride.
  4. Send it. When your recipient clicks the "View the Photo" button, it
     opens the Google Photos share page in their browser - no account needed.

  Want to change the wording? Just edit the text between the <h1>, <p>, and
  <a> tags below. The photo link is set in two places (the button and the
  plain-text fallback) - update both if you ever change it.
  ============================================================================
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A photo for you</title>
</head>
<body style="margin:0;padding:0;background:#f4f1ec;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">

<!-- Outer table = email background -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f4f1ec;padding:32px 12px;">
  <tr>
    <td align="center">

      <!-- Card -->
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:14px;box-shadow:0 4px 24px rgba(60,40,20,0.08);overflow:hidden;">

        <!-- Header ribbon -->
        <tr>
          <td style="background:linear-gradient(135deg,#c9956b 0%,#a8673d 100%);padding:28px 32px;text-align:center;">
            <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#fff5ea;font-weight:600;">
              A little something for you
            </div>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:36px 40px 24px 40px;text-align:center;color:#2d2420;">
            <h1 style="margin:0 0 16px 0;font-size:26px;line-height:1.25;color:#2d2420;font-weight:700;">
              I saved this one for you.
            </h1>
            <p style="margin:0 0 28px 0;font-size:16px;line-height:1.55;color:#57493f;">
              Tap the button below to open the photo.
              It'll pop right up in your browser &mdash; no sign-in,
              no app needed.
            </p>

            <!-- Button -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto;">
              <tr>
                <td align="center" style="border-radius:999px;background:#a8673d;">
                  <a href="https://photos.app.goo.gl/7x4LxoZjX67xCTqd6"
                     target="_blank"
                     style="display:inline-block;padding:16px 38px;font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:999px;background:#a8673d;">
                    View the Photo &rarr;
                  </a>
                </td>
              </tr>
            </table>

            <p style="margin:28px 0 0 0;font-size:13px;line-height:1.5;color:#8a7b6f;">
              Button not working? Copy and paste this link into your browser:<br>
              <a href="https://photos.app.goo.gl/7x4LxoZjX67xCTqd6"
                 style="color:#a8673d;word-break:break-all;">
                https://photos.app.goo.gl/7x4LxoZjX67xCTqd6
              </a>
            </p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 40px 32px 40px;text-align:center;border-top:1px solid #f0e9e0;">
            <p style="margin:0;font-size:12px;color:#a89687;">
              With love &#9825;
            </p>
          </td>
        </tr>

      </table>
      <!-- /Card -->

    </td>
  </tr>
</table>

</body>
</html>
