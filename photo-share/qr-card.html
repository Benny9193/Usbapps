<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A little surprise</title>
<style>
  @page { margin: 0.5in; }
  html, body { margin: 0; padding: 0; background: #f4f1ec; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 Helvetica, Arial, sans-serif;
    color: #2d2420;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    box-sizing: border-box;
  }
  .card {
    width: 420px;
    max-width: 100%;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(60, 40, 20, 0.12);
    padding: 40px 36px 32px 36px;
    text-align: center;
    border: 1px solid #efe6db;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #a8673d;
    font-weight: 700;
    margin-bottom: 12px;
  }
  h1 {
    margin: 0 0 10px 0;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
  }
  p.sub {
    margin: 0 0 26px 0;
    font-size: 15px;
    color: #6b5b4e;
    line-height: 1.5;
  }
  .qr-wrap {
    display: inline-block;
    padding: 18px;
    background: #fff;
    border: 1px solid #efe6db;
    border-radius: 12px;
  }
  .qr-wrap img {
    display: block;
    width: 260px;
    height: 260px;
  }
  .hint {
    margin: 22px 0 0 0;
    font-size: 13px;
    color: #a89687;
    line-height: 1.5;
  }
  .heart { color: #c44545; }
  @media print {
    body { background: #ffffff; }
    .card { box-shadow: none; border: none; }
  }
</style>
</head>

  <div class="card">
    <div class="eyebrow">For you</div>
    <h1>Scan me <span class="heart">&#9825;</span></h1>
